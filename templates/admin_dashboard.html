<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>🏦 SmartBank Admin Dashboard</h1>

<hr>

<div class="row">

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Users</h5>

<h2>{{ total_users }}</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Accounts</h5>

<h2>{{ total_accounts }}</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Transactions</h5>

<h2>{{ total_transactions }}</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Balance</h5>

<h2>₹{{ total_balance }}</h2>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
